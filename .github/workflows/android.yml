name: Build and Release APK

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for recent commits
        id: check
        run: |
          COMMITS=$(git log --since="3 days ago" --no-merges --oneline)
          
          # Проверяем: если коммитов нет И это не ручной запуск - отменяем сборку
          if [ -z "$COMMITS" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "No new commits in the last 3 days. Skipping build."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "New commits found or manual trigger. Proceeding to build."
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check_changes
    if: needs.check_changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Снова указываем 0, чтобы правильно сгенерировать тело релиза ниже

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Get commit info
        id: commit
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          
          COMMITS=$(git log --since="3 days ago" --no-merges --pretty=format:"- %s (%h)")
          
          if [ -z "$COMMITS" ]; then
            COMMITS="- Manual launch or no changes"
          fi
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release and Debug APK
        run: ./gradlew assembleRelease assembleDebug -PciVersionCode=${{ github.run_number }} -PciVersionName="${{ github.run_number }}-${{ steps.commit.outputs.hash }}"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APKs
        run: |
          mv ${{steps.sign_app.outputs.signedReleaseFile}} flux.apk
          mv app/build/outputs/apk/debug/app-debug.apk flux-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-alpha-${{ github.run_number }}
          name: Build ${{ steps.commit.outputs.hash }} (${{ github.run_number }})
          prerelease: false
          files: |
            flux.apk
            flux-debug.apk
          body: |
            ## Changes in this build:
            
            ${{ steps.commit.outputs.body }}
            
            ---
            🔗 Commit: ${{ steps.commit.outputs.hash }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Update JSON
        run: |
          mkdir -p public
          CHANGELOG=$(echo "${{ steps.commit.outputs.body }}" | awk '{printf "%s\\n", $0}' | sed 's/"/\\"/g')
          cat <<EOF > public/update.json
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "Build ${{ steps.commit.outputs.hash }} (${{ github.run_number }})",
            "changelog": "$CHANGELOG",
            "releaseApkUrl": "https://github.com/nikanikoo/flux-android/releases/download/build-alpha-${{ github.run_number }}/flux.apk",
            "debugApkUrl": "https://github.com/nikanikoo/flux-android/releases/download/build-alpha-${{ github.run_number }}/flux-debug.apk"
          }
          EOF

      - name: Deploy Update JSON to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false
